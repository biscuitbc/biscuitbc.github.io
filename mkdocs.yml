site_name: biscuitbc's Blog
site_url: https://biscuitbc.github.io
site_author: biscuitbc
site_description: 技术笔记与学习记录

repo_name: biscuitbc/biscuitbc.github.io
repo_url: https://github.com/biscuitbc/biscuitbc.github.io

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/pdf.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/biscuitbc

nav:
  - 主页: index.md
  - 概率与统计:
    - 概览: notes/math/index.md
    - 概率论:
      - 概率论课程总结: notes/math/probability_summary.md
    - 数理统计:
      - 数理统计课程总结: notes/math/stats_summary.md
      - Cramér-Rao 下界: notes/math/cramer_rao.md
    - 高等概率论:
      - 高等概率论课程总结: notes/math/advanced_probability_summary.md
  - 分析与方程:
    - notes/analysis/index.md
    - 数学分析 III:
      - 数学分析 III 课程总结: notes/analysis/analysis3_summary.md
  - 代数与数论:
    - notes/algebra/index.md
  - 理论计算机科学:
    - notes/tcs/index.md
  - 计算机系统架构:
    - notes/arch/index.md
  - 关于: about.md
