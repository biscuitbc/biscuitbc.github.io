site_name: biscuitbc's Blog
site_url: https://biscuitbc.github.io
site_author: biscuitbc
site_description: 技术笔记与学习记录

repo_name: biscuitbc/biscuitbc.github.io
repo_url: https://github.com/biscuitbc/biscuitbc.github.io

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/pdf.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/biscuitbc

nav:
  - 主页: index.md
  - 概率与统计:
    - Cramér-Rao 下界: notes/math/cramer_rao.md
  - 技术笔记:
    - notes/index.md
    - 编程语言:
      - notes/lang/python.md
      - notes/lang/cpp.md
    - 工具:
      - notes/tools/git.md
      - notes/tools/linux.md
  - 关于: about.md
